<html lang="en">

    <head>
        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>APP web</title>
        <link rel="stylesheet" href="style/indexA.css">

    </head>

    
    <body>

        <h1 id="BaseDatos">BASE DE DATOS</h1>

        <div class="botones-backend">
            <button onclick="llamadoAlGet()">Backend Emojies</button>
            <button onclick="llamadoAlGetP()">Backend Películas</button>
        </div>

        <div class="contenedor-principal">

            <!-- PELICULAS -->
            <section class="seccion peliculas">

                <h2>🎬 Películas</h2>

                <div class="cards">

                    <!-- AGREGAR -->
                    <div class="card">
                        <h3>➕ Agregar Película</h3>

                        <input id="ingresoDuracion" placeholder="Duración">
                        <input id="ingresoFecha" placeholder="Fecha estreno">
                        <input id="ingresoGenero" placeholder="Género">
                        <input id="ingresoSaga" placeholder="Saga">
                        <input id="ingresoAnimado" placeholder="Animado">
                        <input id="ingresoTitulo" placeholder="Título">

                        <button onclick="tomarDatosP()">Enviar</button>
                    </div>

                    <!-- EDITAR -->
                    <div class="card">
                        <h3>✏️ Editar Película</h3>

                        <select id="selector-datosP">
                            <option value="">Seleccione Dato</option>
                        </select>

                        <input id="ingresoTituloP" placeholder="Título">
                        <input id="ingresoDuracionP" placeholder="Duración">
                        <input id="ingresoFechaP" placeholder="Fecha">
                        <input id="ingresoGeneroP" placeholder="Género">
                        <input id="ingresoSagaP" placeholder="Saga">
                        <input id="ingresoAnimadoP" placeholder="Animado">

                        <button onclick="cambiarDatoP()">Modificar</button>
                    </div>

                    <!-- ELIMINAR -->
                    <div class="card">
                        <h3>🗑️ Eliminar Película</h3>

                        <select id="selector-datos-eliminarP">
                            <option value="">Seleccione Dato</option>
                        </select>

                        <button onclick="borrarDatosP()">Eliminar</button>
                    </div>

                </div>

            </section>

            <!-- EMOJIES -->
            <section class="seccion emojies">

                <h2>😍 Emojies</h2>

                <div class="cards">

                    <!-- AGREGAR -->
                    <div class="card">
                        <h3>➕ Agregar Emoji</h3>

                        <input id="ingresoNombre" placeholder="Nombre">
                        <input id="ingresoTipo" placeholder="Emoji">

                        <button onclick="tomarDatos()">Enviar</button>
                    </div>

                    <!-- EDITAR -->
                    <div class="card">
                        <h3>✏️ Editar Emoji</h3>

                        <select id="selector-datos">
                            <option value="">Seleccione Dato</option>
                        </select>

                        <input id="ingresoTipoPUT" placeholder="Emoji">
                        <input id="ingresoNombrePUT" placeholder="Nombre">

                        <button onclick="cambiarDato()">Modificar</button>
                    </div>

                    <!-- ELIMINAR -->
                    <div class="card">
                        <h3>🗑️ Eliminar Emoji</h3>

                        <select id="selector-datos-eliminar">
                            <option value="">Seleccione Dato</option>
                        </select>

                        <button onclick="borrarDatos()">Eliminar</button>
                    </div>

                </div>

            </section>

        </div>

        <a href="indexJ.html">GUARDAR E IR AL JUEGO</a>

    </body>



</html>
