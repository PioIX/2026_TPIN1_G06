<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Registro</title>
    </head>
    <body>

        <h1>Registro</h1>

        <input type="text" id="name" placeholder="Nombre">
        <br><br>

        <input type="text" id="username" placeholder="Apellido">
        <br><br>

        <input type="text" id="user" placeholder="Usuario">
        <br><br>

        <input type="email" id="mail" placeholder="Mail">
        <br><br>

        <input type="password" id="contra" placeholder="Contraseña">
        <br><br>

        <input type="number" id="dni" placeholder="DNI">
        <br><br>    

        <button id="botonRegistrarse">
            Registrarse
        </button>

        <script src="registro.js"></script>
        <script src="login.js"></script>

    </body>
</html>
