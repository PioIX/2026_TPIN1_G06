<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css">
    <title>Proyecto Interdisciplinario Primer Cuatrimestre 2026</title>
  </head>
  
</body>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top custom-navbar">
      <div class="container-fluid d-flex flex-row align-items-center">
        <a class="navbar-brand" href="#">
          <img
            src="./logo-pio.png"
            alt="Logo del Colegio"
            style="max-width: 130px; height: auto; margin-right: 20px"
          />
        </a>
        <div class="flex-grow-1 header-info">
          <h4 class="mb-1 text-dark">
            Proyecto Interdisciplinario - Alumnos: Jimenez, Langan, Atienza y Ciceran.
          </h4>
          <h5 class="mb-0 text-muted">
            5to Informática 2026 - Colegio Pio IX - Profesores: Ing. Pablo Morandi y Matías Marchesi
          </h5>
        </div>
      </div>
    </nav>

    <div class="main-wrapper">
      <div class="container custom-card" id="loginForm">
        
        <div class="form-section mb-4">
          <legend class="section-title">¡Bienvenido! Inicie sesión</legend>
          
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control custom-input"
              id="user"
              placeholder="Usuario"
            />
            <label for="user">Usuario</label>
          </div>

          <div class="form-floating mb-3">
            <input
              type="email"
              class="form-control custom-input"
              id="email"
              placeholder="nombre@example.com"
            />
            <label for="email">Correo electrónico</label>
          </div>
          
          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control custom-input"
              id="password"
              placeholder="********"
            />
            <label for="password">Contraseña</label>
          </div>

          <div class="d-grid gap-2">
            <button
              class="btn-game-primary"
              onclick="botonLogin()"
              data-bs-toggle="tooltip"
              data-bs-placement="top"
              title="Iniciar sesión"
            >
              Iniciar sesión
            </button>
          </div>
        </div>

        <hr class="custom-divider">

        <div class="form-section">
          <legend class="section-title-sub">¿No tenés usuario? Registrate</legend>
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control custom-input"
              id="name"
              placeholder="Pepe"
            />
            <label for="name">Nombre de usuario</label>
          </div>
          <div class="d-grid gap-2">
            <button
              class="btn-game-primary"
              onclick="botonRegistro()"
              data-bs-toggle="tooltip"
              data-bs-placement="top"
              title="Registrarse"
            >
              Registrarse
            </button>
          </div>
        </div>

      </div>
    </div>
    
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
    
    <script src="dom.js"></script>
    <script src="user.js"></script>
    <script src="indexF.js"></script>
  </body>
</html>
