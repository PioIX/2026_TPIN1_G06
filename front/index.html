<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css">
    <title>Proyecto Interdisciplinario Primer Cuatrimestre 2026</title>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg sticky-top bg-secondary">
      <div class="container-fluid d-flex flex-row align-items-center">
        <a class="navbar-brand" href="#">
          <img
            src="./logo-pio.png"
            alt="Logo del Colegio"
            style="max-width: 150px; height: auto; margin-right: 30px"
          />
        </a>
        <div class="flex-grow-1">
          <h4 class="text-black mb-3">
            Proyecto Interdisciplinario Primer Cuatrimestre 2026 - Alumnos: Jimenez, Langan, Atienza y Ciceran.
          </h4>
          <h5 class="text-black mb-3">
            5to Informática 2026 - Colegio Pio IX - Profesores: Ing. Pablo
            Morandi y Matías Marchesi
          </h5>
        </div>
      </div>
    </nav>

     <div class="form-floating mb-3">
          <input
            type="user"
            class="form-control"
            id="user"
            placeholder="Usuario"
          />
          <label for="user">Usuario</label>
        </div>

    <div class="container mt-3" id="loginForm">
      <div class="shadow p-3 mb-5 bg-white rounded">
        <legend>¡Bienvenido! Inicie sesión</legend>
        <div class="form-floating mb-3">
          <input
            type="mail"
            class="form-control"
            id="email"
            placeholder="nombre@example.com"
          />
          <label for="email">Correo electrónico</label>
        </div>

       
        <div class="form-floating mb-3">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="********"
          />
          <label for="password">Contraseña</label>
        </div>
        <div class="mb-3 d-flex justify-content-end">
          <button
            class="btn btn-success me-2"
            onclick="botonLogin()"
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            title="Iniciar sesión"
          >
            Iniciar sesión
          </button>
        </div>
      </div>
      <div class="shadow p-3 mb-5 bg-white rounded">
        <legend>O si desea registrarse, además indíquenos su nombre.</legend>
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="name"
            placeholder="Pepe"
          />
          <label for="username">Nombre de usuario</label>
        </div>
        <div class="mb-3 d-flex justify-content-end">
          <button
            class="btn btn-danger"
            onclick="botonRegistro()"
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            title="Registrarse"
          >
            Registrarse
          </button>
        </div>
      </div>
    </div>
    
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
    
    <script src="dom.js"></script>
    <script src="user.js"></script>
    <script src="indexF.js"></script>
    
  </body>
</html>
