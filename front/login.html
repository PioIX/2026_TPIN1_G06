<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link rel="stylesheet" href="style/login.css">
    </head>
    <body>

        <h1>Iniciar Sesión</h1>

        <input
            type="text"
            id="user"
            placeholder="Usuario"
        >

        <br><br>

        <input
            type="password"
            id="contra"
            placeholder="Contraseña"
        >

        <br><br>

        <button id="botonLogin">
            Ingresar
        </button>

        <button id="botonPagRegistro">
            ¿No tenes usuario? ¡Registrate!
        </button>




        <script src="login.js"></script>
    

    </body>
</html>
