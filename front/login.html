<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css"> 
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="screen view-login">
        <div class="container">
            
            <h1 class="title-main">Iniciar Sesión</h1>

            <div class="input-group">
                <input
                    type="text"
                    id="user"
                    class="input-field"
                    placeholder="Usuario"
                >

                <input
                    type="password"
                    id="contra"
                    class="input-field"
                    placeholder="Contraseña"
                >
            </div>

            <div class="button-group">
                <button id="botonLogin" class="btn-primary">
                    Ingresar
                </button>

                <button id="botonPagRegistro" class="btn-primary">
                    ¿No tenés usuario? ¡Registrate!
                </button>
            </div>

        </div>
    </div>
